<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador de Curriculum</title>
    <link rel="stylesheet" href="style.css">

    <!-- Librería para generar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>Generador de Curriculum Vitae</h1>

        <form id="cvForm">
            <input type="text" id="nombre" placeholder="Nombre Completo" required>
            <input type="email" id="email" placeholder="Correo Electrónico" required>
            <input type="text" id="telefono" placeholder="Teléfono" required>
            
            <textarea id="perfil" placeholder="Perfil Profesional" required></textarea>
            <textarea id="experiencia" placeholder="Experiencia Laboral" required></textarea>
            <textarea id="educacion" placeholder="Educación" required></textarea>
            <textarea id="habilidades" placeholder="Habilidades" required></textarea>

            <button id="dowloadPdf" onclick="generarPDF()">Generar PDF</button>
        </form>
    </div>

    <script src="fuction.js"></script>
</body>
</html>
